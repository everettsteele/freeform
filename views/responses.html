<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FREEFORM — Responses</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css"></head><body>
<nav class="nav">
  <a class="nav-logo" href="/dashboard">FREE<span>FORM</span></a>
  <div class="nav-right">
    <button class="btn btn-secondary btn-sm" onclick="window.location='/dashboard'">← Dashboard</button>
    <button class="btn btn-secondary btn-sm" id="edit-btn">Edit Form</button>
    <button class="btn btn-primary btn-sm" id="csv-btn">Export CSV</button>
  </div>
</nav>
<div class="layout"><div class="main">
  <div class="page-title" id="form-title">Loading...</div>
  <div class="page-sub" id="form-sub"></div>
  <div class="stat-row">
    <div class="stat"><div class="stat-label">Responses</div><div class="stat-val" id="stat-count">—</div></div>
    <div class="share-box" style="flex:1;align-self:center">
      <span style="font-size:11px;color:var(--muted);font-weight:600;margin-right:4px">SHARE:</span>
      <span class="share-url" id="share-url"></span>
      <button class="btn btn-secondary btn-sm" onclick="copyLink()">Copy</button>
    </div>
  </div>
  <div id="responses-container"></div>
</div></div>
<script>
const formId=window.location.pathname.split('/forms/')[1].split('/')[0];
let formData=null;

async function init(){
  const [form,responses]=await Promise.all([
    fetch('/api/forms/'+formId).then(r=>r.json()),
    fetch('/api/responses/'+formId).then(r=>r.json())
  ]);
  if(form.error){window.location='/dashboard';return;}
  formData=form;
  document.title='FREEFORM — '+form.title;
  document.getElementById('form-title').textContent=form.title;
  document.getElementById('form-sub').textContent=form.slug+' · '+(form.is_active?'Active':'Paused');
  document.getElementById('share-url').textContent=window.location.origin+'/f/'+form.slug;
  document.getElementById('edit-btn').onclick=()=>window.location='/forms/'+formId+'/edit';
  document.getElementById('csv-btn').onclick=()=>window.location='/api/responses/'+formId+'/csv';
  document.getElementById('stat-count').textContent=responses.length;
  renderResponses(form.fields,responses);
}

function renderResponseFields(fields, data) {
  // If the form has defined fields, use those for ordering
  const definedFields = fields.filter(f => f.type !== 'divider');
  if (definedFields.length > 0) {
    return definedFields.map(f => {
      const val = Array.isArray(data[f.id]?.value) ? data[f.id].value.join(', ') : (data[f.id]?.value || '—');
      return `<div class="resp-field"><div class="resp-field-label">${f.label}</div><div class="resp-field-val">${escHtml(String(val))}</div></div>`;
    }).join('');
  }
  // Fallback: render all keys from the data object (open submit forms)
  return Object.entries(data).map(([key, obj]) => {
    const label = obj.label || key;
    const val = Array.isArray(obj.value) ? obj.value.join(', ') : (obj.value || '—');
    return `<div class="resp-field"><div class="resp-field-label">${escHtml(label)}</div><div class="resp-field-val">${escHtml(String(val))}</div></div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResponses(fields, responses){
  const el=document.getElementById('responses-container');
  if(!responses.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No responses yet. Share your form to start collecting.</div></div>';
    return;
  }
  el.innerHTML=responses.map((r,i)=>{
    const expanded = `<div class="resp-fields" id="resp-body-${r.id}" style="display:none;padding:14px 18px 18px;border-top:1px solid var(--border);background:#fafafa">${renderResponseFields(fields, r.data)}</div>`;
    return `<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden">`+
      `<div class="resp-header" onclick="toggleResp('${r.id}')" style="padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none">`+
        `<span style="font-size:12px;color:var(--muted);font-family:'Space Mono',monospace">${new Date(r.created_at*1000).toLocaleString()}</span>`+
        `<div style="display:flex;align-items:center;gap:10px">`+
          `<span id="resp-arrow-${r.id}" style="font-size:11px;color:var(--muted)">▶ view</span>`+
          `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteResponse('${r.id}')">Delete</button>`+
        `</div>`+
      `</div>`+
      expanded+
    `</div>`;
  }).join('');
}

function toggleResp(id) {
  const body = document.getElementById('resp-body-'+id);
  const arrow = document.getElementById('resp-arrow-'+id);
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  arrow.textContent = open ? '▼ hide' : '▶ view';
}

async function deleteResponse(id){
  if(!confirm('Delete this response?'))return;
  await fetch('/api/responses/'+id,{method:'DELETE'});
  init();
}

function copyLink(){
  navigator.clipboard.writeText(window.location.origin+'/f/'+(formData?formData.slug:''));
}

init();
</script>
<style>
.resp-field { margin-bottom: 12px; }
.resp-field-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; font-family: 'Space Mono', monospace; }
.resp-field-val { font-size: 13px; color: #111; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.resp-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px 20px; }
.resp-header:hover { background: #f5f5f5; }
</style>
</body></html>
