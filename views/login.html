<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FREEFORM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css"></head><body>
<div class="auth-wrap"><div class="auth-card">
<div class="auth-logo">FREE<span>FORM</span></div>
<div class="auth-sub">Sign in to manage your forms.</div>
<div id="alert"></div>
<div class="form-group"><label class="form-label">Email</label><input id="email" type="email" class="form-input" placeholder="you@example.com"></div>
<div class="form-group"><label class="form-label">Password</label><input id="password" type="password" class="form-input" placeholder="••••••••"></div>
<button class="btn btn-primary" style="width:100%" onclick="login()">Sign In</button>
<div class="auth-footer">New here? <a href="/register">Create account</a></div>
</div></div>
<script>
async function login(){
  const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
  const d=await res.json();
  if(d.ok)window.location='/dashboard';
  else{const a=document.getElementById('alert');a.className='alert alert-err';a.textContent=d.error;}
}
document.addEventListener('keydown',e=>e.key==='Enter'&&login());
</script></body></html>
